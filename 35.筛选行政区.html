<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>筛选行政区</title>
  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.18/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.18/"></script>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/tasks/QueryTask",
      "esri/tasks/support/Query",
      "esri/layers/FeatureLayer",
    ], function (Map, MapView, QueryTask, Query, FeatureLayer) {
      let xzqLayerView;

      // flash flood warnings layer
      var layer = new FeatureLayer({
        url: "https://zyc.dongtaiyuming.net/server/rest/services/Hosted/三省县域/FeatureServer/0",
        // definitionExpression: "一级类 = '' OR 一级类 IS NULL OR 二级类 = '' OR 二级类 IS NULL OR 三级类 = '' OR 三级类 IS NULL",
      });

      const map = new Map({
        basemap: "gray-vector",
        layers: [layer]
      });

      const view = new MapView({
        map: map,
        container: "viewDiv",
        center: [117.70, 28.31],
        zoom: 9,
      });

      view.ui.add("optionsDiv", "bottom-right");

      const optionsDiv = document.getElementById("optionsDiv");

      optionsDiv.addEventListener("change", filterFeatures);

      function filterFeatures(event) {
        var index1 = document.getElementById("proSelect").selectedIndex;
        var proname = document.getElementById("proSelect").options[index1].innerText;
        var index2 = document.getElementById("citySelect").selectedIndex;
        var cityname = document.getElementById("citySelect").options[index2].innerText;
        if (proname == "") {
          xzqLayerView.filter = {
            where: "",
          }
        } else if (proname != "" && cityname == "") {
          xzqLayerView.filter = {
            where: "province = '" + proname + "'",
          }
        } else if (proname != "" && cityname != "") {
          xzqLayerView.filter = {
            where: "province = '" + proname + "' AND " + "city = '" + cityname + "'",
          }
        } else {

        }
      }

      view.whenLayerView(layer).then(function (layerView) {
        xzqLayerView = layerView;
        // view.extent = xzqLayerView.fullExtent;
      });

      layer.when(function (layerView) {
        view.extent = layerView.fullExtent;
      });
    });
  </script>


</head>

<body>
  <div id="viewDiv"></div>
  <div class="esri-widget" id="optionsDiv">
    <h2>选择行政区</h2>
    <select class="esri-widget" id="proSelect">
      <option value=""></option>
    </select>
    <select class="esri-widget" id="citySelect">
      <option value=""></option>
    </select>
    <!-- <select class="esri-widget" id="countySelect">
      <option value=""></option>
    </select> -->
    <br />
    <br />
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/tasks/QueryTask",
      "esri/tasks/support/Query",
      "esri/layers/FeatureLayer",
    ], function (Map, MapView, QueryTask, Query, FeatureLayer) {
      var query = new Query();
      query.outFields = ["name", "code", "city", "citycode", "province", "procode"];
      query.where = "1=1";
      // query.returnGeometry = true;
      //实例化查询对象
      var queryTask = new QueryTask("https://zyc.dongtaiyuming.net/server/rest/services/Hosted/三省县域/FeatureServer/0");
      //进行查询
      queryTask.execute(query).then(function (results) {
        var arr0 = [];
        results.features.forEach(e => {
          arr0.push({
            name: e.attributes.name,
            code: e.attributes.code,
            city: e.attributes.city,
            citycode: e.attributes.citycode,
            province: e.attributes.province,
            procode: e.attributes.procode,
          })
        });

        var compare = function (prop) {
          return function (obj1, obj2) {
            var val1 = obj1[prop];
            var val2 = obj2[prop];
            if (!isNaN(Number(val1)) && !isNaN(Number(val2))) {
              val1 = Number(val1);
              val2 = Number(val2);
            }
            if (val1 < val2) {
              return -1;
            } else if (val1 > val2) {
              return 1;
            } else {
              return 0;
            }
          }
        }

        arr0.sort(compare("citycode"))

        var arr1 = [];
        arr1.push({
          province: arr0[0].province,
          procode: arr0[0].procode,
        })
        for (var i = 1; i < arr0.length; i++) {
          if (arr0[i - 1].province !== arr0[i].province) {
            arr1.push({
              province: arr0[i].province,
              procode: arr0[i].procode,
            })
          } else {

          }
        };

        var arr2 = [];
        arr2.push({
          city: arr0[0].city,
          citycode: arr0[0].citycode,
        })

        for (var i = 1; i < arr0.length; i++) {
          if (arr0[i - 1].city !== arr0[i].city) {
            arr2.push({
              city: arr0[i].city,
              citycode: arr0[i].citycode,
            })
          } else {

          }
        };

        // var arr3 = [];
        // arr3.push({
        //   name: arr0[0].name,
        //   code: arr0[0].code,
        // })

        // for (var i = 1; i < arr0.length; i++) {
        //   if (arr0[i - 1].name !== arr0[i].name) {
        //     arr3.push({
        //       name: arr0[i].name,
        //       code: arr0[i].code,
        //     })
        //   } else {

        //   }
        // };

        console.log(arr0);

        for (i = 0; i < arr1.length; i++) {
          document.querySelectorAll('#proSelect')[0].options[i + 1] = new Option(arr1[i].province, arr1[i].procode);
        }

        for (i = 0; i < arr2.length; i++) {
          document.querySelectorAll('#citySelect')[0].options[i + 1] = new Option(arr2[i].city, arr2[i].citycode);
          document.querySelectorAll('#citySelect')[0].options[i + 1].style.display='none'

        };

        // for (i = 0; i < arr3.length; i++) {
        //   document.querySelectorAll('#countySelect')[0].options[i + 1] = new Option(arr3[i].name, arr3[i].code);
        // };

        var oplist1 = document.querySelectorAll('#proSelect')[0].children;
        var oplist2 = document.querySelectorAll('#citySelect')[0].children;
        // var oplist3 = document.querySelectorAll('#countySelect')[0].children;

        var proSelect = document.querySelector('#proSelect');
        proSelect.addEventListener('change', function (e) {

          document.querySelectorAll('#citySelect')[0].value = '';

          // document.querySelectorAll('#countySelect')[0].value = '';

          for (var i = oplist2.length - 1; i > 0; i--) {
            if (document.querySelectorAll('#proSelect')[0].value != '' && oplist2[i].value.substring(0, 5) == document.querySelectorAll('#proSelect')[0].value.substring(0, 5)) {
              oplist2[i].style.display = '';
            } else {
              oplist2[i].style.display = 'none';
            }
          }

          // for (var i = oplist3.length - 1; i > 0; i--) {
          //   if (oplist3[i].value.substring(0, 7) == document.querySelectorAll('#citySelect')[0].value.substring(0, 7)) {
          //     oplist3[i].style.display = '';
          //   } else {
          //     oplist3[i].style.display = 'none';
          //   }
          // }
        }, true);
      });
    });

  </script>



</body>

</html>
