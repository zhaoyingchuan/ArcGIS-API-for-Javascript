<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>筛选行政区</title>
  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.18/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.18/"></script>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/tasks/QueryTask",
      "esri/tasks/support/Query",
    ], function (Map, MapView, QueryTask, Query) {

      var map = new Map({
        basemap: "topo-vector",
      });

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [116.40, 39.90], // longitude, latitude
        zoom: 13,
      });
      view.ui.add("optionsDiv", "bottom-right");

      var query = new Query();
      query.outFields = ["name","code","city", "citycode","province", "procode"];
      query.where = "1=1";
      // query.returnGeometry = true;
      //实例化查询对象
      var queryTask = new QueryTask("https://zyc.dongtaiyuming.net/server/rest/services/Hosted/三省县域/FeatureServer/0");
      //进行查询
      queryTask.execute(query).then(function (results) {
        var arr0 = [];
        results.features.forEach(e => {
          arr0.push({
            name: e.attributes.name,
            code: e.attributes.code,
            city: e.attributes.city,
            citycode: e.attributes.citycode,
            province: e.attributes.province,
            procode: e.attributes.procode,
          })
        });

        var compare = function (prop) {
          return function (obj1, obj2) {
            var val1 = obj1[prop];
            var val2 = obj2[prop];
            if (!isNaN(Number(val1)) && !isNaN(Number(val2))) {
              val1 = Number(val1);
              val2 = Number(val2);
            }
            if (val1 < val2) {
              return -1;
            } else if (val1 > val2) {
              return 1;
            } else {
              return 0;
            }
          }
        }

        arr0.sort(compare("citycode"))

        var arr1=[];
        arr1.push({
          province: arr0[0].province,
          procode: arr0[0].procode,
        })
        for(var i = 1; i < arr0.length;i++){
          if(arr0[i-1].province !== arr0[i].province){
            arr1.push({
              province: arr0[i].province,
              procode: arr0[i].procode,
            })
          } else {
      
          }
        };

        var arr2=[];
        arr2.push({
          city: arr0[0].city,
          citycode: arr0[0].citycode,
        })

        for(var i = 1; i < arr0.length;i++){
          if(arr0[i-1].city !== arr0[i].city){
            arr2.push({
              city: arr0[i].city,
              citycode: arr0[i].citycode,
            })
          } else {
      
          }
        };

        var arr3=[];
        arr3.push({
          name: arr0[0].name,
          code: arr0[0].code,
        })

        for(var i = 1; i < arr0.length;i++){
          if(arr0[i-1].name !== arr0[i].name){
            arr3.push({
              name: arr0[i].name,
              code: arr0[i].code,
            })
          } else {
      
          }
        };


        // for(var i = 1; i < arr.length;i++){
        //   if(arr[i-1] = arr[i]){
        //     arr.splice(i, 1);
        //     i--;
        //   } else {

        //   }
        // };

        console.log(arr3);

        for (i = 0; i < arr1.length; i++) {
          document.querySelectorAll('#proSelect')[0].options[i] = new Option(arr1[i].province, arr1[i].procode);
        }

        for (i = 0; i < arr2.length; i++) {
          document.querySelectorAll('#citySelect')[0].options[i] = new Option(arr2[i].city, arr2[i].citycode);
        };

        for (i = 0; i < arr3.length; i++) {
          document.querySelectorAll('#countySelect')[0].options[i] = new Option(arr3[i].name, arr3[i].code);
        };
      });
    });
  </script>

  <script>
    // 为“一级类”绑定change事件
    // 这里的document作为一种未简写的方式，与on搭配才能为未出现的元素绑定事件
    // 如果使用简写方式，document这个位置上的元素必须在执行事件前存在于DOM树中

    // $(document).on("change", "select:eq(0)", function () {

    // })

    //原生JS方法
    cccc
  </script>
</head>

<body>
  <div id="viewDiv"></div>
  <div class="esri-widget" id="optionsDiv">
    <h2>选择行政区</h2>
    <select class="esri-widget" id="proSelect">
    </select>
    <select class="esri-widget" id="citySelect">
    </select>
    <select class="esri-widget" id="countySelect">
    </select>
    <br />
    <br />
    <!-- <button class="esri-widget" id="doBtn">Do Query</button> <br />
    <p><span id="printResults"></span></p> -->
  </div>


</body>

</html>
