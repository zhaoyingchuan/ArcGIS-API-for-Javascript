<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>筛选行政区</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.17/esri/css/esri.css">
  <script src="https://js.arcgis.com/4.17/"></script>
  <style>
      html,
      body,
      #map {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }
  </style>
  <script>
    require([
      "esri/Map",
      // "esri/layers/ArcGISDynamicMapServiceLayer",
      "esri/tasks/QueryTask",
      "esri/tasks/support/Query",
      // "dojo/domReady!",
      "esri/layers/FeatureLayer",
    ], function (Map,QueryTask,Query, FeatureLayer) {
      var query=new Query();
      // query.outFields = ["*"];
      query.where = "1=1";
      // query.returnGeometry = true;
      //实例化查询对象
      var queryTask = new QueryTask("https://services6.arcgis.com/hVJzGaciz2BCDgT4/arcgis/rest/services/三省县域/FeatureServer");
      //进行查询
      queryTask.execute(query).then(function(results){
        console.log(results.Feature);
      });
    });
  </script>
</head>
<body>
    <div id="map"></div>
    
</body>
</html>
