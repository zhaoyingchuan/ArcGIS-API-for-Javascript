      html,
      body,

        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }

      .esri-ui .esri-editor__scroller {
        max-height: 600px;
      }

      .esri-view-height-greater-than-medium .esri-expand .esri-widget--panel, .esri-view-height-greater-than-medium .esri-expand .esri-widget--panel-height-only, .esri-view-height-greater-than-medium .esri-ui-corner .esri-component.esri-widget--panel, .esri-view-height-greater-than-medium .esri-ui-corner .esri-component.esri-widget--panel-height-only {

      .esri-view-height-medium .esri-expand .esri-widget--panel, .esri-view-height-medium .esri-expand .esri-widget--panel-height-only, .esri-view-height-medium .esri-ui-corner .esri-component.esri-widget--panel, .esri-view-height-medium .esri-ui-corner .esri-component.esri-widget--panel-height-only {
        max-height: 1200px;
      }

      .esri-view .esri-view-surface--inset-outline:focus::after {
        outline: auto 0px Highlight !important;
        outline: auto 0px -webkit-focus-ring-color !important;
      }

    <script>
      require([
        "esri/WebMap",
        "esri/views/MapView",
				"esri/layers/FeatureLayer",
        "esri/widgets/Editor",
        "esri/widgets/LayerList",
      ], function (WebMap, MapView, FeatureLayer, Editor, LayerList) {

				var myFeatureLayer = new FeatureLayer({
					url: "https://services3.arcgis.com/U26uBjSD32d7xvm2/arcgis/rest/services/中心城区和乡镇1223/FeatureServer/0",
          definitionExpression: "一级类 = ' ' Or 一级类 IS NULL Or 二级类 = ' ' Or 二级类 IS NULL Or 三级类 = ' ' Or 三级类 IS NULL"
				});

        var editLayer;

        // Create a map frm the referenced webmap item id
        var webmap = new WebMap({
          portalItem: {
            id: "bb328ac19e1343a5903b2a72e57884f2"
          },
					// layers: myFeatureLayer
        });

				webmap.add(myFeatureLayer)

        var view = new MapView({
          container: "viewDiv",
          map: webmap,
					center: [117.70,28.31],
					zoom: 12
        });
        

        view.when(function () {
          view.popup.autoOpenEnabled = false; //disable popups

          // Loop through webmap layers and set an EditConfig for each
          view.map.layers.forEach(function (layer) {
            if (layer.title === "中心城区和乡镇1223") {
              editLayer = {
                layer: layer,
                fieldConfig: [
                  // {
                  //   name: "zldwmc",
                  //   label: "所属乡镇/权属单位",
									// 	editable: false
                  // },
                  {
                    name: "DLBM",
                    label: "地类编码",
										editable: false
                  },
                  {
                    name: "DLMC",
                    label: "地类名称",
                    editable: false
                  },
                  {
                    name: "一级类",
                    label: "一级类",
										editable: true
                  },
                  {
                    name: "二级类",
                    label: "二级类",
										editable: true
                  },
                  {
                    name: "三级类",
                    label: "三级类",
										editable: true
                  },
                  // {
                  //   name: "是否符合转化表",
                  //   label: "是否符合转化表",
									// 	editable: true
                  // },
                  // {
                  //   name: "bz",
                  //   label: "备注",
									// 	editable: true
                  // },
                ]
              };
            }
          });

          // Create the Editor
          var editor = new Editor({
            view: view,
            // Pass in the configurations created above
            layerInfos: [editLayer],
            allowedWorkflows: ["update"],
            
          });

          // Add widget to top-right of the view
          view.ui.add(editor, "top-right");

          view.when(function () {
            var layerList = new LayerList({
              view: view
            });

            // Add widget to the top right corner of the view
            view.ui.add(layerList, "top-right");
          });
        });
      });
    </script>

      $(document).on("change click",".esri-input.esri-feature-form__input.esri-select:eq(0)",function(){
        var arr1 = document.getElementsByClassName('esri-input esri-feature-form__input esri-select')[0];

        var arr2 = document.getElementsByClassName('esri-input esri-feature-form__input esri-select')[1];
        arr2.value=''

        var arr3 = document.getElementsByClassName('esri-input esri-feature-form__input esri-select')[2];
        arr3.value=''

        var oplist1=arr1.children;
        var oplist2=arr2.children;
        var oplist3=arr3.children;

        var x2=0
        for(var i=oplist2.length-1;i>=0;i--){
          if(oplist2[i].value.substring(0,2)==arr1.value.substring(0,2)){
            oplist2[i].style.display='';
            x2=x2+1
          }else {
            oplist2[i].style.display='none';
          }
        }
        if(x2==0){
          arr2.lastChild.style.display='';
          arr2.value='无'
        }else{
          arr2[0].style.display=''
        }

        var x3=0
        for(var i=oplist3.length-1;i>=0;i--){
          if(oplist3[i].value.substring(0,2)==arr1.value.substring(0,2)){
            oplist3[i].style.display='';
            x3=x3+1
          }else {
            oplist3[i].style.display='none';
          }
        }
        if(x3==0){
          arr3.lastChild.style.display='';
          arr3.value='无'
        }else{
          arr3.firstChild.style.display=''
        }
