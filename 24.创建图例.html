<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>加载ArcGIS Online图层</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
 
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.17/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.17/"></script>
 
    <script>
      require([
        "esri/WebMap", 
        "esri/views/MapView",
        "esri/widgets/Legend", 
        "esri/layers/FeatureLayer",
      ], function(WebMap, MapView, Legend, FeatureLayer) {
    
        var webmap = new WebMap({
          basemap: "dark-gray-vector"
        });

        var view = new MapView({
          container: "viewDiv",
          map: webmap,
          center: [117.70, 28.31],
          zoom: 12
        });

        var layer1 = new FeatureLayer({
          url: "https://services6.arcgis.com/hVJzGaciz2BCDgT4/arcgis/rest/services/省厅下发城镇开发边界修改/FeatureServer/1",
        });

        // var layer2 = new FeatureLayer({
        //   url: "https://services6.arcgis.com/hVJzGaciz2BCDgT4/arcgis/rest/services/铅山县乡镇/FeatureServer/0",
        // });

        webmap.addMany([layer1]);

        view.when(function () {
          var legend = new Legend({
            view: view,
            layerInfos: [
              {
                layer: [layer1],
                title: "图例"
              }
            ]
          });
          view.ui.add(legend, "bottom-right");
        });
      });
    </script>
  </head>
 
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
