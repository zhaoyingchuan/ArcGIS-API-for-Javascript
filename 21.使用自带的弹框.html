<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>使用自带弹框</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
 
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.17/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.17/"></script>
 
    <script>
      require(["esri/Map", "esri/views/MapView","esri/layers/FeatureLayer"], function(Map, MapView,FeatureLayer) {
        
        //为了自动显示弹框，加载图层需要使用portalItem的方法
        var layer = new FeatureLayer({
          portalItem: {
            id: "2e93b861d4744c12b34d074c9de199a2"
          },
          outFields: ["XZQMC"],
        });
        
        //图层需要直接放在Map的layers属性中，不能使用add方法加入
        var map = new Map({
          layers: [layer],
        });
 
        var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 5,
          center: [117.70,28.31],
        });

      });
    </script>
  </head>
 
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
