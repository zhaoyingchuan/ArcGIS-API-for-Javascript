<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <!--
  ArcGIS API for JavaScript, https://js.arcgis.com
  For more information about the widgets-editor-configurable sample, read the original sample description at developers.arcgis.com.
  https://developers.arcgis.com/javascript/latest/sample-code/widgets-editor-configurable/index.html

<title>过滤字段并设置是否可编辑</title>

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.16/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.16/"></script>

    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }

      .esri-editor .esri-item-list__scroller {
        max-height: 350px;
      }
    </style>

    <script>
      require([
        "esri/WebMap",
        "esri/views/MapView",
				"esri/layers/FeatureLayer",
        "esri/widgets/Editor"
      ], function (WebMap, MapView, FeatureLayer, Editor) {

				var myFeatureLayer = new FeatureLayer({
					url: "https://services5.arcgis.com/6TqOiOhyqcUv6dB0/arcgis/rest/services/铅山县乡镇/FeatureServer/0"
				});

        let editLayer;

        // Create a map frm the referenced webmap item id
        let webmap = new WebMap({
          portalItem: {
            id: "52f08e7f7f9947b0a6592a284ce816f8"
          },
					// layers: myFeatureLayer
        });

				webmap.add(myFeatureLayer)

        let view = new MapView({
          container: "viewDiv",
          map: webmap,
					center: [117.70,28.31],
					zoom: 12
        });

        view.when(function () {
          view.popup.autoOpenEnabled = false; //disable popups

          // Create a custom group to separate the different areas of crime.
          // This function takes a 'grouping' object containing a featuretemplate and a feature layer.

          // function customGroup(grouping) {
          //   // If the layer is 'Police routes', do not group.
          //   let groupHeading = "Police Routes";
          //   if (grouping.layer.title.toLowerCase() === "crime map") {
          //     switch (grouping.template.name) {
          //       case "Criminal Homicide":
          //       case "Rape":
          //       case "Robbery":
          //       case "Aggravated Assault":
          //         groupHeading = "Violent Crime";
          //         break;
          //       case "Arson":
          //       case "Burglary":
          //       case "Larceny":
          //       case "Motor Vehicle Theft":
          //         groupHeading = "Property Crime";
          //         break;
          //       default:
          //         groupHeading = "Quality of Life";
          //     }
          //   }
          //   return groupHeading;
          // }

          // Loop through webmap layers and set an EditConfig for each
          view.map.layers.forEach(function (layer) {
            if (layer.title === "铅山县乡镇") {
              editLayer = {
                layer: layer,
                fieldConfig: [
                  {
                    name: "XZQMC",
                    label: "乡镇名称",
										editable: true,
                  },
                  {
                    name: "XZQDM",
                    label: "乡镇代码",
										editable: false
                  },
                ]
              };
            } 
            // else {
            //   // Specify a few of the fields to edit within the form
            //   editConfigPoliceLayer = {
            //     layer: layer,
            //     // Set it so that only one field displays within the form
            //     fieldConfig: [
            //       {
            //         name: "PatrolType",
            //         label: "Patrol Type"
            //       }
            //     ]
            //   };
            // }
          });

          // Create the Editor
          var editor = new Editor({
            view: view,
            // Pass in the configurations created above
            layerInfos: [editLayer],
            label:"XZQMC"
            // Override the default template behavior of the Editor widget
            // supportingWidgetDefaults: {
            //   featureTemplates: {
            //     groupBy: customGroup
            //   }
            // }
          });

          // Add widget to top-right of the view
          view.ui.add(editor, "top-right");
        });
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
    <div id="editorDiv"></div>
  </body>
</html>
