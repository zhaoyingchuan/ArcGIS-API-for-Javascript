<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>谷歌卫星图</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
 
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.16/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.16/"></script>
 
    <script>
      require(["esri/Map", "esri/views/MapView","esri/layers/WebTileLayer"], function(Map, MapView,WebTileLayer) {
    
        var tiledLayer = new WebTileLayer({
          urlTemplate:
            "http://mt0.google.cn/vt/lyrs=s&x={col}&y={row}&z={level}"
        });
 
        // var tiledLayer_poi = new WebTileLayer({
        //   urlTemplate:
        //     "http://{subDomain}.tianditu.com/cva_w/wmts?SERVICE=WMTS&VERSION=1.0.0&REQUEST=GetTile&LAYER=cva&STYLE=default&FORMAT=tiles&TILEMATRIXSET=w&TILEMATRIX={level}&TILEROW={row}&TILECOL={col}&tk=2abf8e0da26d8348bb5308cb346701df",
        //   subDomains: ["t0", "t1", "t2", "t3","t4", "t5", "t6", "t7"],
        // });
 
        var map = new Map({
            basemap: {
              baseLayers: [tiledLayer]
            }
        });
 
        var view = new MapView({
          container: "viewDiv",
          map: map,
          zoom: 13,
          center: [117.70,28.31] // longitude, latitude
        });
      });
    </script>
  </head>
 
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
