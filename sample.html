    html,
    body,

      padding: 0;

      max-height: 1200px;
    }

    .esri-view-height-medium .esri-expand .esri-widget--panel,
    .esri-view-height-medium .esri-expand .esri-widget--panel-height-only,
    .esri-view-height-medium .esri-ui-corner .esri-component.esri-widget--panel,
    .esri-view-height-medium .esri-ui-corner .esri-component.esri-widget--panel-height-only {
      max-height: 1200px;

    .esri-view .esri-view-surface--inset-outline:focus::after {
      outline: auto 0px Highlight !important;

    }

  <!-- 引用ArcGIS JS API -->
  <script src="https://js.arcgis.com/4.17/"></script>
  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/widgets/Editor",
      "esri/widgets/LayerList",
    ], function (WebMap, MapView, FeatureLayer, Editor, LayerList) {

      var myFeatureLayer = new FeatureLayer({
        url: "https://services6.arcgis.com/hVJzGaciz2BCDgT4/arcgis/rest/services/中心城区和乡镇/FeatureServer/0",
        definitionExpression: "一级类 = '' Or 一级类 IS NULL Or 二级类 = '' Or 二级类 IS NULL Or 三级类 = '' Or 三级类 IS NULL"
      });

      // Create a map frm the referenced webmap item id
      var webmap = new WebMap({
        
      });
      webmap.add(myFeatureLayer)

      var view = new MapView({
        container: "viewDiv",
        map: webmap,
        center: [117.70, 28.31],
        zoom: 12
      });

      var editLayer;
      view.when(function () {
        view.popup.autoOpenEnabled = false; //disable popups
        // Loop through webmap layers and set an EditConfig for each
        view.map.layers.forEach(function (layer) {
          if (layer.title === "中心城区和乡镇") {
            editLayer = {
              layer: layer,
              fieldConfig: [
                {
                  name: "DLBM",
                  label: "地类编码",
                  editable: false
                },
                {
                  name: "DLMC",
                  label: "地类名称",
                  editable: false
                },
                {
                  name: "一级类",
                  label: "一级类",
                  editable: true
                },
                {
                  name: "二级类",
                  label: "二级类",
                  editable: true
                },
                {
                  name: "三级类",
                  label: "三级类",
                  editable: true
                }
              ]
            };
          }
        });

        // Create the Editor
        var editor = new Editor({
          view: view,
          // Pass in the configurations created above
          layerInfos: [editLayer],
          allowedWorkflows: ["update"],

        });

        // Add widget to top-right of the view
        view.ui.add(editor, "top-right");

        view.when(function () {
          var layerList = new LayerList({
            view: view
          });
          // Add widget to the top right corner of the view
          view.ui.add(layerList, "top-right");
        });
      });
    });
  </script>
