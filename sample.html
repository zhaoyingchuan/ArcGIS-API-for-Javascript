<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Create a Starter App</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }

    #sidebar {
        z-index: 99;
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        width: 320px;
      }

    #text {
      color: white;
      padding: 3%;
    }
  </style>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.18/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.18/"></script>
  
  <script>  
    require([
      "esri/Map",
      "esri/views/MapView",
    ], function(Map, MapView) {
      
      var map = new Map({
        basemap: "topo-vector",
      });

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [116.40, 39.90], // longitude, latitude
        zoom: 13,   
        // padding: {
        //   right: 320// Same value as the #sidebar width in CSS
        // }     
      });
    });
  </script>
</head>
<body>
  <div id="viewDiv">
    <div id="sidebar" class="esri-widget">
      <div id="text">
        <h1>Liberty Island</h1>
        <p>
          Note that setting the view.padding makes the view.center,
          view.extent etc work off a subsection of the full view.
        </p>
        <p>Try to resize the window to get a better understanding.</p>
      </div>
    </div>
  </div>
</body>
</html>
