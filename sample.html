
<html>
    <head>
      <meta charset="utf-8" />
      <meta
        name="viewport"
        content="initial-scale=1,maximum-scale=1,user-scalable=no"
      />

  <title>过滤字段并设置是否可编辑</title>
  
      <link
        rel="stylesheet"
        href="https://js.arcgis.com/4.16/esri/themes/light/main.css"
      />
      <script src="https://js.arcgis.com/4.16/"></script>
  
      <style>
        html,
        body,
        #viewDiv {
          padding: 0;
          margin: 0;
          height: 100%;
          width: 100%;
        }
  
        .esri-editor .esri-item-list__scroller {
          max-height: 350px;
        }
      </style>
  
      <script>
        require([
          "esri/WebMap",
          "esri/views/MapView",
                  "esri/layers/FeatureLayer",
          "esri/widgets/Editor"
        ], function (WebMap, MapView, FeatureLayer, Editor) {
  
                  var myFeatureLayer = new FeatureLayer({
                      url: "https://services5.arcgis.com/6TqOiOhyqcUv6dB0/arcgis/rest/services/国土空间规划用途分类未定/FeatureServer/0",
            definitionExpression: "一级类 = ' ' Or 一级类 IS NULL Or 二级类 = ' ' Or 二级类 IS NULL Or 三级类 = ' ' Or 三级类 IS NULL"
                  });
  
          let editLayer;
  
          // Create a map frm the referenced webmap item id
          let webmap = new WebMap({
            portalItem: {
              id: "52f08e7f7f9947b0a6592a284ce816f8"
            },
                      // layers: myFeatureLayer
          });
  
                  webmap.add(myFeatureLayer)
  
          let view = new MapView({
            container: "viewDiv",
            map: webmap,
                      center: [117.70,28.31],
                      zoom: 12
          });
  
          view.when(function () {
            view.popup.autoOpenEnabled = false; //disable popups
  
            // Loop through webmap layers and set an EditConfig for each
            view.map.layers.forEach(function (layer) {
              if (layer.title === "国土空间规划用途分类未定") {
                editLayer = {
                  layer: layer,
                  fieldConfig: [
                    {
                      name: "dlbm",
                      label: "地类编码",
                                          editable: false,
                    },
                    {
                      name: "dlmc",
                      label: "地类名称",
                                          editable: false
                    },
                    {
                      name: "一级类",
                      label: "一级类",
                                          editable: true
                    },
                    {
                      name: "二级类",
                      label: "二级类",
                                          editable: true
                    },
                    {
                      name: "三级类",
                      label: "三级类",
                                          editable: true
                    },
                    {
                      name: "是否符合转化表",
                      label: "是否符合转化表",
                                          editable: true
                    },
                  ]
                };
              }
            });
  
            // Create the Editor
            var editor = new Editor({
              view: view,
              // Pass in the configurations created above
              //layerInfos: [editLayer],
              
            });
  
            // Add widget to top-right of the view
            view.ui.add(editor, "top-right");
          });
        });
      </script>
    </head>
  
    <body>
      <div id="viewDiv"></div>
      <div id="editorDiv"></div>
    <!-- Code injected by live-server -->
