<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1, maximum-scale=1,user-scalable=no"
    />
    <title>
      FeatureTable widget with editing enabled | Sample | ArcGIS API for
      JavaScript 4.17
    </title>

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.17/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.17/"></script>

    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      #viewDiv {
        height: 50%;
        width: 100%;
      }

      .container {
        height: 50%;
        width: 100%;
      }
    </style>

    <script>
      require([
        "esri/Map",
        "esri/views/MapView",
        "esri/layers/FeatureLayer",
        "esri/widgets/FeatureTable"
      ], function (Map, MapView, FeatureLayer, FeatureTable) {
        let featureLayer;
        const features = [];

        const map = new Map({
          basemap: "streets-navigation-vector"
        });

        let view = new MapView({
          container: "viewDiv",
          map: map,
          center: [117.70, 28.31],
          zoom: 8,
          popup: {
            autoOpenEnabled: false
          } //disable popups
        });

        view.when(function () {
          featureLayer = new FeatureLayer({
            portalItem: {
              id: "0881e34a779e4dd6aa07a2b5bf56ae5e"
            },
            outFields: ["*"],
            title: "Chicago crime incidents"
          });
          map.add(featureLayer);

          // Create the feature table
          const featureTable = new FeatureTable({
            view: view,
            layer: featureLayer,
            editingEnabled: true,
            fieldConfigs: [
              {
                name: "Name",
                label: "县名",
                editable: false,
                direction: "asc"
              },
              {
                name: "Population",
                label: "人口"
              },
            ],
            container: document.getElementById("tableDiv")
          });
        });
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
    <div class="container">
      <div id="tableDiv"></div>
    </div>
  </body>
</html>
