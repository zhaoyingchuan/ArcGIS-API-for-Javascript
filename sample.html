<!DOCTYPE html>
<html lang="zh-cn">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Traffic One Map" />
	<meta name="author" content="ESRI China @ 2018" />
	<title>全国矿产地数据库2021版</title>
	<link rel="icon" type="image/png" href="./favicon.png" />
	<link rel="stylesheet" href="libs/font-awesome-4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="libs/iconfont/iconfont.css">
	<link rel="stylesheet" href="libs/bootstrap-3.3.7/css/bootstrap.css">
	
	<link rel="stylesheet" href="css/global.css">
	<link rel="stylesheet" href="css/animate.css">
	
	<link rel="stylesheet" href="css/main.css">
	
	<link rel="stylesheet" href="http://data.ngac.org.cn/4.12/esri/css/main.css">
	<!-- <link rel="stylesheet" href="http://localhost/jsapi/4.12/esri/css/main.css"> -->
</head>

<body class="trafficMapBaseTemplate">
	<!-- LOADING -->
	<div class="wrap">
		<div class="container">
			<i class="fa fa-cog fa-spin fa-3x fa-fw margin-bottom"></i>
		</div>
	</div>
	<!-- LOADING END -->
	<!-- NAV -->
	<nav class="navbar navbar-define">
		<div class="navbar-logo-left">全国矿产地数据库2021版</div>
		<!-- <div class="navbar-logo-middle"></div> -->
		<div class="navbar-tool">
			<ul>
				<li class="tool-layer"><a id="navbar-tool-layer" href="javascript:void(0)" class="navbar-tool-layer"
						title="图层控制"></a></li>
				<li class="tool-legend"><a id="navbar-tool-legend" href="javascript:void(0)" class="navbar-tool-legend"
						title="图例"></a></li>
				<li class="tool-query"><a id="navbar-tool-query" href="javascript:void(0)" class="navbar-tool-query"
						title="查询"></a></li>
			</ul>
		</div>
	</nav>
	<!-- 地图 -->
	<div class="allblack">
		<div id="layer1">
		</div>
	</div>
	<!--图层列表-->
	<div class="box-right-project layer">
		<div class="project-head">图层列表</div>
		<span class="iconfont iconguanbi"></span>
		<div class="statistics-tab layer-content" id="layer-content" style="height: calc(100% - 55px);"></div>
	</div>
	<!--图例-->
	<div class="box-right-project legend">
		<div class="project-head">图例</div>
		<span class="iconfont iconguanbi"></span>
		<div class="statistics-tab legend-content" id="legend-content" style="height: calc(100% - 55px);"></div>
	</div>
	<!--查询-->
	<div class="box-right-project query">
		<div class="project-head">查询</div>
		<span class="iconfont iconguanbi"></span>
		<div class="statistics-tab query-tab">
			<button class="currents" tabname="querytab">任务</button>
			<button tabname="result">结果</button>
		</div>
		<div class="statistics-tab query querytab" style="height: calc(100% - 63px);">
			<div class="title"><img src="images/icon.png">查询条件</div>
			<div class="table-content">
				<div class="query-select">
					<div class="query-select-title">属性条件：</div>
					<ul>
						<li class="row">
							<div class="col-sm-4">矿产地名</div>
							<div class="kcdm-box col-sm-8" style="height: 100%;padding: 0;">
								<input type="text" style="padding-left:5px;width: 100%;height: 100%;border-radius: 3px;	border: 1px solid #ccc;">
							</div>
						</li>
						<li class="row">
							<div class="col-sm-4">矿种</div>
							<div class="input-box2 input-Selector col-sm-8">
								<input type="text" class="wx-input" style="padding-left:5px">
							</div>
						</li>
					</ul>
				</div>
				<div class="query-select">
					<div class="query-select-title">空间过滤：</div>
					<ul>
						<li class="row">
							<div class="col-sm-4">过滤条件</div>
							<form class="input-Selector col-sm-8">
								<select id="input-select" name="input-select" class="wx-input">
									<option value="1">行政区划</option>
									<option value="2">成矿带</option>
									<!-- <option value="3">靶区</option> -->
									<option value="4">自定义范围</option>
									<option value="5">无</option>
								</select>
							</form>
						</li>
						<li class="row spatial-query spatial1">
							<div class="col-sm-4">行政区划</div>
							<div class="input-box3 input-Selector col-sm-8">
								<input type="text" class="wx-input" style="padding-left:5px" value="北京市">
							</div>
						</li>
						<li class="row spatial-query spatial2">
							<div class="col-sm-4">成矿带</div>
							<div class="input-box4 input-Selector col-sm-8">
								<input type="text" class="wx-input" style="padding-left:5px">
							</div>
						</li>
						<li class="row spatial-query spatial3">
							<div class="col-sm-4">靶区</div>
							<div class="input-box5 input-Selector col-sm-8">
								<input type="text" class="wx-input" style="padding-left:5px">
							</div>
						</li>
						<li class="row spatial-query spatial4">
							<div class="col-sm-4">自定义范围</div>
							<div class="input-Selector col-sm-8" id="drawDiv">
								<div class="draw-div"><span class="iconfont iconshanchu1"></span></div>
								<!-- <div class="draw-div"><span class="iconfont iconjuxing"></span></div>
								<div class="draw-div"><span class="iconfont iconyuanxing"></span></div>
								<div class="draw-div"><span class="iconfont iconduobianxing"></span></div> -->
							</div>
						</li>
					</ul>
				</div>
			</div>
			<div class="spinner-box" style="display: none;margin-top: 70px;">
				<div class="pulse-container">
					<div class="pulse-bubble pulse-bubble-1"></div>
					<div class="pulse-bubble pulse-bubble-2"></div>
					<div class="pulse-bubble pulse-bubble-3"></div>
				</div>
			</div>
			<button class="query-sure">确定</button>
		</div>		
		<div class="statistics-tab query result" style="display: none;height: calc(100% - 63px);">
			<div class="title"><img src="images/icon.png">查询结果</div>
			<div class="table-content">
				<div class="result-count">符合条件的要素总计：<i>-</i></div>
				<div class="result-list">
				</div>
			</div>
			<button class="clear-sure">清除结果</button>
		</div>
	</div>

	<!-- Base Scripts -->
	<script type="text/javascript" src="app/config/config.js"></script>
	<script type="text/javascript" src="libs/jquery-3.3.1.min.js"></script>
	<script type="text/javascript" src="libs/bootstrap-3.3.7/js/bootstrap.min.js"></script>

	<script type="text/javascript" src="libs/jquery.slimscroll.min.js"></script>

	<script type="text/javascript" src="libs/plumen.js"></script>
	<script src="http://data.ngac.org.cn/4.12/init.js"></script>
	<!-- <script src="http://localhost/jsapi/4.12/init.js"></script> -->
	<!-- Require Scripts -->
	<script type="text/javascript" src="libs/require.js"></script>
	<script type="text/javascript" src="app/config/requireConfig.js"></script>
	<script type="text/javascript">
		require(["modules/main"], function (Template) {
			var template = new Template(configOptions);
		});
	</script>
</body>

</html>
