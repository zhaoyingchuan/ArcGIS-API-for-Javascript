<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ArcGIS API for JavaScript Tutorials: Display a Web Map</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  <link rel="stylesheet" href="https://js.arcgis.com/4.16/esri/themes/light/main.css">  <script src="https://js.arcgis.com/4.16/"></script>
  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView"
    ], function(WebMap, MapView) {

      var webmap = new WebMap({
        portalItem: {
          id: "52f08e7f7f9947b0a6592a284ce816f8"
        }
      });

      var view = new MapView({
        container: "viewDiv",
        map: webmap
      });
      
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
