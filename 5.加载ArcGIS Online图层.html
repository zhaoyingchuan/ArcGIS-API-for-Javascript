<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>加载ArcGIS Online图层</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
 
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.17/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.17/"></script>
 
    <script>
      require([
        "esri/WebMap", 
        "esri/views/MapView", 
        "esri/layers/FeatureLayer",], 
        function(WebMap, MapView, FeatureLayer) {
    
        var webmap = new WebMap({
          portalItem: {id: "bb328ac19e1343a5903b2a72e57884f2"}
        });

        var view = new MapView({
          container: "viewDiv",
          map: webmap
        });

        var layer = new FeatureLayer({
          url: "https://services3.arcgis.com/U26uBjSD32d7xvm2/arcgis/rest/services/县域/FeatureServer/0",
        });

        webmap.add(layer);
      });
    </script>
  </head>
 
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
