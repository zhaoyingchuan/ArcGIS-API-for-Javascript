<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>加载ArcGIS Online图层</title>
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
 
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.17/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.17/"></script>
 
    <script>
      require(["esri/WebMap", "esri/views/MapView", "esri/layers/FeatureLayer"], function(WebMap, MapView, FeatureLayer) {
    
        var webmap = new WebMap({
          portalItem: {id: "52f08e7f7f9947b0a6592a284ce816f8"}
        });

        var view = new MapView({
          container: "viewDiv",
          map: webmap
        });

        var xzxzqLayer = new FeatureLayer({
          url: "https://services5.arcgis.com/6TqOiOhyqcUv6dB0/arcgis/rest/services/铅山县乡镇/FeatureServer/0",
        });

        webmap.add(xzxzqLayer);
      });
    </script>
  </head>
 
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
