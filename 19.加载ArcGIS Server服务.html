<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>加载ArcGIS Server服务</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.17/esri/themes/light/main.css">  
  <script src="https://js.arcgis.com/4.17/"></script>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/layers/FeatureLayer"], 
      function(WebMap, MapView, FeatureLayer, Editor) {
      
      var webmap = new WebMap({
        portalItem: {
          id: "bb328ac19e1343a5903b2a72e57884f2"
        },
        // layers: myFeatureLayer
      });

      var myFeatureLayer = new FeatureLayer({
        url: "https://localhost:6443/arcgis/rest/services/%E9%93%85%E5%B1%B1%E5%8E%BF_%E6%95%B4%E5%90%88%E4%BC%98%E5%8C%96%E5%89%8D%E8%8C%83%E5%9B%B4%E5%8F%8A%E5%8A%9F%E8%83%BD%E5%88%86%E5%8C%BA%E5%9B%BE0706/MapServer",
      });
      webmap.add(myFeatureLayer)

      var view = new MapView({
        container: "viewDiv",
        map: webmap,
        center: [117.70,28.31],
        zoom: 12
      });
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
