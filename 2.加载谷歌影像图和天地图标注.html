<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>加载天地图影像和天地图标注</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.18/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.18/"></script>
  
  <script>  
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Basemap",
      "esri/layers/WebTileLayer",
      "esri/widgets/BasemapToggle",
    ], function(Map, MapView, Basemap, WebTileLayer, BasemapToggle) {

      var tiledLayer = new WebTileLayer({
        // urlTemplate:
        //   "http://mt0.google.com/vt/lyrs=s&x={col}&y={row}&z={level}",
        urlTemplate:
          "https://gac-geo.googlecnapps.cn/maps/vt?lyrs=s&x={col}&y={row}&z={level}",
      });

      var tiledLayer_poi = new WebTileLayer({
        urlTemplate:
          "http://{subDomain}.tianditu.gov.cn/DataServer?T=cia_w&x={col}&y={row}&l={level}&tk=85c9d12d5d691d168ba5cb6ecaa749eb",
        subDomains: ["t0", "t1", "t2", "t3","t4", "t5", "t6", "t7"],
      });

      var myBasemap = new Basemap({
          baseLayers: [tiledLayer, tiledLayer_poi],
        });
      
      var map = new Map({
        basemap: myBasemap,
      });
      
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [116.329,26.049],
        zoom: 17,
      });
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
