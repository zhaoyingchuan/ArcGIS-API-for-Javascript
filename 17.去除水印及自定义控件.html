<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ArcGIS API for JavaScript Tutorials: Create a Starter App</title>
  <style>
    html, body, 
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
    #zoomWidget{
			position: absolute;
			top:200px;
			right:15px
    }
  </style>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.16/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.16/"></script>
  
  <script>  
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/widgets/Zoom"
    ], function(Map, MapView, Zoom) {
      
      var map = new Map({
        basemap: "topo-vector"
      });

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [116.40, 39.90], // longitude, latitude
      zoom: 13
      });

      view.ui.components = [ ];

      var zoom = new Zoom({
        view: view
      },zoomWidget);
      view.ui.add(zoom);
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
  <div id="zoomWidget"></div>
</body>
</html>
