<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ArcGIS JavaScript Tutorials: Add, edit, and delete features</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.15/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.15/"></script>
  
  <script>  
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/WebTileLayer",
      "esri/layers/FeatureLayer",
      "esri/widgets/Editor"
    ], function(Map, MapView, WebTileLayer, FeatureLayer, Editor) {


      var tiledLayer = new WebTileLayer({
        urlTemplate:
          "http://mt0.google.cn/vt/lyrs=s&x={col}&y={row}&z={level}"
      });

      var tiledLayer_poi = new WebTileLayer({
        urlTemplate:
          "http://{subDomain}.tianditu.gov.cn/DataServer?T=cva_w&x={col}&y={row}&l={level}&tk=5823959c38b2d69b25e84a7482d27e10",
        subDomains: ["t0", "t1", "t2", "t3","t4", "t5", "t6", "t7"],
      });
      // Reference a feature layer to edit
      var myFeatureLayer = new FeatureLayer({
        url: "https://services5.arcgis.com/6TqOiOhyqcUv6dB0/arcgis/rest/services/铅山县乡镇/FeatureServer/0"
      });
      
      var map = new Map({
        basemap: {
          baseLayers: [tiledLayer, tiledLayer_poi]
        },
        layers: [myFeatureLayer]
      });
      
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [117.70,28.31],
        zoom: 13
      });
      // Editor widget
      var editor = new Editor({
        view: view
      });

      // Add widget to the view
      view.ui.add(editor, "top-right"); 
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
