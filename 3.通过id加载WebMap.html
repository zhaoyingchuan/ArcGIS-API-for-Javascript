<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>通过id加载WebMap</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.17/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.17/"></script>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView"
    ], function(WebMap, MapView) {

      var webmap = new WebMap({
        portalItem: {
          id: "bb328ac19e1343a5903b2a72e57884f2"
        }
      });

      var view = new MapView({
        container: "viewDiv",
        map: webmap
      });
      
    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
