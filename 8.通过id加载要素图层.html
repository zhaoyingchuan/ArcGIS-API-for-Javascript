<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ArcGIS API for JavaScript Tutorials: Add a layer from an item</title>
  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
  
    <link rel="stylesheet" href="https://js.arcgis.com/4.16/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.16/"></script>
  
  <script>  
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/Layer"
    ], function(Map, MapView, Layer) {

      var map = new Map({
        basemap: "topo-vector"
      });
      
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-118.80543,34.02700],
        zoom: 13
      });
      
      function addLayer(layerItemPromise, index) {
        return layerItemPromise.then(function(layer){
          map.add(layer, index);
        });
      }
      
      // Challenge 
      
//      function addLayer(layerItemPromise, index) {

//          layer.when(function(){ 
//             if (layer.title === "Trails_Styled_Popups") {
//              layer.definitionExpression = "ELEV_GAIN < 250";
//             }
//          });
//          map.add(layer, index);
//        });
//      }
            
      // Trailheads
      var trailheadsPortalItem = Layer.fromPortalItem({
        portalItem: {
          id: "a4e16d76bd114fe68ec44a262fd09435"
        }
      });


      addLayer(trailheadsPortalItem, 0)

    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
